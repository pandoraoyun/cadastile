<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- card -->
  <rect x="2" y="2" width="756" height="396" rx="14" fill="#fcfcfd" stroke="#e6e6ec" stroke-width="1.5"/>

  <text x="30" y="38" font-size="17" font-weight="600" fill="#23232b">Dual grid — one filled/empty grid, smooth edges for free</text>

  <!-- ============ filled world cells (the painted shape) ============ -->
  <!-- world grid origin (90,84), tile 48 -->
  <g fill="#59b98a" fill-opacity="0.28">
    <rect x="138" y="132" width="48" height="48"/>
    <rect x="186" y="132" width="48" height="48"/>
    <rect x="234" y="132" width="48" height="48"/>
    <rect x="138" y="180" width="48" height="48"/>
    <rect x="186" y="180" width="48" height="48"/>
    <rect x="186" y="228" width="48" height="48"/>
  </g>

  <!-- ============ world grid (solid) ============ -->
  <g stroke="#b4b8c0" stroke-width="1.2">
    <!-- vertical -->
    <line x1="90"  y1="84" x2="90"  y2="324"/>
    <line x1="138" y1="84" x2="138" y2="324"/>
    <line x1="186" y1="84" x2="186" y2="324"/>
    <line x1="234" y1="84" x2="234" y2="324"/>
    <line x1="282" y1="84" x2="282" y2="324"/>
    <line x1="330" y1="84" x2="330" y2="324"/>
    <line x1="378" y1="84" x2="378" y2="324"/>
    <!-- horizontal -->
    <line x1="90" y1="84"  x2="378" y2="84"/>
    <line x1="90" y1="132" x2="378" y2="132"/>
    <line x1="90" y1="180" x2="378" y2="180"/>
    <line x1="90" y1="228" x2="378" y2="228"/>
    <line x1="90" y1="276" x2="378" y2="276"/>
    <line x1="90" y1="324" x2="378" y2="324"/>
  </g>

  <!-- ============ display grid (dashed, +½ tile offset) ============ -->
  <g stroke="#d76a97" stroke-width="1.3" stroke-dasharray="5 4" opacity="0.9">
    <!-- vertical: x = 114 + 48i -->
    <line x1="114" y1="108" x2="114" y2="300"/>
    <line x1="162" y1="108" x2="162" y2="300"/>
    <line x1="210" y1="108" x2="210" y2="300"/>
    <line x1="258" y1="108" x2="258" y2="300"/>
    <line x1="306" y1="108" x2="306" y2="300"/>
    <line x1="354" y1="108" x2="354" y2="300"/>
    <!-- horizontal: y = 108 + 48j -->
    <line x1="114" y1="108" x2="354" y2="108"/>
    <line x1="114" y1="156" x2="354" y2="156"/>
    <line x1="114" y1="204" x2="354" y2="204"/>
    <line x1="114" y1="252" x2="354" y2="252"/>
    <line x1="114" y1="300" x2="354" y2="300"/>
  </g>

  <!-- ============ one highlighted display tile [162,108]-[210,156] ============ -->
  <rect x="162" y="108" width="48" height="48" fill="#3fae7d" fill-opacity="0.42" stroke="#2f9e6f" stroke-width="2.2"/>

  <!-- its 4 corners = 4 world-cell centers: top two empty, bottom two filled -->
  <!-- empty corners -->
  <circle cx="162" cy="108" r="5.5" fill="#ffffff" stroke="#9aa0a6" stroke-width="1.6"/>
  <circle cx="210" cy="108" r="5.5" fill="#ffffff" stroke="#9aa0a6" stroke-width="1.6"/>
  <!-- filled corners -->
  <circle cx="162" cy="156" r="5.5" fill="#2f9e6f"/>
  <circle cx="210" cy="156" r="5.5" fill="#2f9e6f"/>

  <!-- leader from tile to explanation -->
  <path d="M 210 132 L 404 132" stroke="#c9ccd3" stroke-width="1.3" fill="none"/>
  <circle cx="210" cy="132" r="2.6" fill="#c9ccd3"/>

  <text x="410" y="120" font-size="14" fill="#33333c">
    <tspan x="410" dy="0" font-weight="600">One display tile</tspan><tspan> reads the fill state</tspan>
    <tspan x="410" dy="20">of its 4 corners (= 4 world cells).</tspan>
    <tspan x="410" dy="20" fill="#6b6b76">Here 2 filled + 2 empty &#8594; a top-edge tile.</tspan>
  </text>

  <!-- ============ legend ============ -->
  <g font-size="13.5" fill="#3a3a44">
    <circle cx="418" cy="212" r="6" fill="#2f9e6f"/>
    <text x="434" y="217">filled world cell (you paint this)</text>

    <circle cx="418" cy="240" r="6" fill="#ffffff" stroke="#9aa0a6" stroke-width="1.6"/>
    <text x="434" y="245">empty world cell</text>

    <line x1="408" y1="268" x2="430" y2="268" stroke="#b4b8c0" stroke-width="1.6"/>
    <text x="440" y="273">world grid</text>

    <line x1="408" y1="296" x2="430" y2="296" stroke="#d76a97" stroke-width="1.6" stroke-dasharray="5 4"/>
    <text x="440" y="301">display grid &#8212; offset ½ tile, actually drawn</text>
  </g>

  <!-- ============ caption ============ -->
  <text x="30" y="368" font-size="14" fill="#4a4a55">
    4 corners &#8594; 2&#8308; = <tspan font-weight="600">16 combinations</tspan> &#8594; just <tspan font-weight="600">16 tiles</tspan> cover every edge &amp; corner.
  </text>
</svg>
